<!DOCTYPE html>
<html>
<head>
    <title>RxManager</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>

    <h2>RxManager - Medicine Tracking System</h2>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search by name..." onkeyup="loadMedicines()" />

    <!-- Add Medicine -->
    <h3>Add Medicine</h3>

    <input id="name" placeholder="Name" />
    <input id="brand" placeholder="Brand" />
    <input id="quantity" type="number" placeholder="Quantity" />
    <input id="price" type="number" step="0.01" placeholder="Price" />
    <input id="expiry" type="date" />
    <button onclick="addMedicine()">Add</button>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Brand</th>
                <th>Expiry</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="medicineTable"></tbody>
    </table>
    <br />
    <h3>Sales History</h3>

    <button onclick="loadSales()">View Sales</button>

    <table>
        <thead>
            <tr>
                <th>Medicine Name</th>
                <th>Quantity Sold</th>
                <th>Sale Date</th>
            </tr>
        </thead>
        <tbody id="salesTable"></tbody>
    </table>

    <script src="app.js"></script>

</body>
</html>
